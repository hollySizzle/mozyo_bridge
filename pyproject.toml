[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mozyo-bridge"
version = "0.4.0"
description = "Redmine-gated tmux pane notification bridge for Claude Code and Codex terminals"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.10"
dependencies = [
    "build>=1.2",
    "PyYAML>=6.0",
]
authors = [
    { name = "takahorishizuru" },
]
keywords = ["tmux", "codex", "claude", "redmine", "cli"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development",
    "Topic :: Terminals",
]

[project.scripts]
mozyo-bridge = "mozyo_bridge.application.cli:main"
mozyo = "mozyo_bridge.application.cli:main"

[project.urls]
Homepage = "https://github.com/hollySizzle/mozyo_bridge"
Repository = "https://github.com/hollySizzle/mozyo_bridge"
Issues = "https://github.com/hollySizzle/mozyo_bridge/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
mozyo_bridge = [
    "scaffold/presets/presets.yaml",
    "scaffold/presets/*/AGENTS.md",
    "scaffold/presets/*/CLAUDE.md",
    "scaffold/presets/*/VERSION",
    "scaffold/presets/*/agent-workflow.md",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
