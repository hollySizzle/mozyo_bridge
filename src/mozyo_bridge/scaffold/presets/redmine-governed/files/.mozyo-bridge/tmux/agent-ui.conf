# mozyo-bridge governed preset: tmux agent UI helper.
#
# Distributed by `mozyo-bridge scaffold apply redmine-governed`.
# Operators can source this file from their `~/.tmux.conf` (or session-
# level config) to give `claude` and `codex` agent windows a subtle,
# fg-only status colour so they are visually distinguishable from
# other windows without changing the agent identity used by resolver /
# handoff routing.
#
# Recommended `~/.tmux.conf` snippet (no markers, no destructive
# overwrite — operators choose when to source it):
#
#   source-file <repo>/.mozyo-bridge/tmux/agent-ui.conf
#
# Skip this file with `mozyo-bridge scaffold apply --skip-tmux-ui` when
# the project does not want agent-window colouring.
#
# Implementation note: both format strings use a single nested
# conditional (`claude` → sage green, else `codex` → slate blue, else
# default `#I:#W`). Earlier revisions used two `set -wga` lines, which
# left the default fallback in place when the second line appended,
# producing duplicated `0:codex#[fg=colour67]0:codex#[default]` output
# on codex windows. The nested form has exactly one branch per window
# name.
#
# --- attention marker (Redmine #11935 / #11951 / #11954 / #11957) ------
# The `#{@mozyo_attention_*}` suffix renders the derived cockpit
# attention state that `mozyo-bridge agents attention-project` caches
# onto a pane as user options (#11954). It is a *projection only*: the
# durable source of truth stays in Redmine / the derived read model, the
# pane options are re-derivable and may be deleted freely, and nothing
# here is consulted for routing / handoff preflight / target resolution
# (#11951 / cockpit-attention-state.md). A `healthy` or unset state adds
# no marker so healthy panes stay quiet; every other state appends a
# short uppercase label (` [REVIEW]`, ` [BLOCKED]`, ...) so the signal is
# legible without colour. An unrecognised state fails safe to UNKNOWN
# rather than looking healthy. Colour is an *auxiliary* hint keyed off
# `@mozyo_attention_severity` (critical → red, warning → amber, notice →
# blue); the label, not the colour, carries the meaning, so the marker
# still reads if colour rendering is unavailable. The agent-name colour
# above is left untouched. These are generic OSS defaults — no operator-
# specific palette and no iTerm profile changes belong here.

set -wg window-status-format          "#{?#{==:#W,claude},#[fg=colour108]#I:#W#[default],#{?#{==:#W,codex},#[fg=colour67]#I:#W#[default],#I:#W}}#{?#{==:#{@mozyo_attention_state},},,#{?#{==:#{@mozyo_attention_state},healthy},, #{?#{==:#{@mozyo_attention_severity},critical},#[fg=colour203],#{?#{==:#{@mozyo_attention_severity},warning},#[fg=colour179],#{?#{==:#{@mozyo_attention_severity},notice},#[fg=colour110],}}}[#{?#{==:#{@mozyo_attention_state},owner_waiting},OWNER,#{?#{==:#{@mozyo_attention_state},review_waiting},REVIEW,#{?#{==:#{@mozyo_attention_state},blocked},BLOCKED,#{?#{==:#{@mozyo_attention_state},stalled},STALLED,#{?#{==:#{@mozyo_attention_state},done},DONE,#{?#{==:#{@mozyo_attention_state},retired_candidate},RETIRE,UNKNOWN}}}}}}]#[default]}}"
set -wg window-status-current-format  "#{?#{==:#W,claude},#[fg=colour108]#I:#W#[default],#{?#{==:#W,codex},#[fg=colour67]#I:#W#[default],#I:#W}}#{?#{==:#{@mozyo_attention_state},},,#{?#{==:#{@mozyo_attention_state},healthy},, #{?#{==:#{@mozyo_attention_severity},critical},#[fg=colour203],#{?#{==:#{@mozyo_attention_severity},warning},#[fg=colour179],#{?#{==:#{@mozyo_attention_severity},notice},#[fg=colour110],}}}[#{?#{==:#{@mozyo_attention_state},owner_waiting},OWNER,#{?#{==:#{@mozyo_attention_state},review_waiting},REVIEW,#{?#{==:#{@mozyo_attention_state},blocked},BLOCKED,#{?#{==:#{@mozyo_attention_state},stalled},STALLED,#{?#{==:#{@mozyo_attention_state},done},DONE,#{?#{==:#{@mozyo_attention_state},retired_candidate},RETIRE,UNKNOWN}}}}}}]#[default]}}"

# --- pane-level attention marker (Redmine #11935 / #11954 / #11957 / #11958)
# The window-status marker above (#11957) is enough when each agent runs
# in its own window: the window tab carries the state. The cockpit layout
# instead stacks several lanes as *panes* inside one window, so an
# inactive pane's stopped state is invisible from the window tab alone.
# This block projects the same `@mozyo_attention_*` pane user options
# (#11954) onto the tmux-native pane border, so every pane — active or
# not — surfaces its own state in a multi-pane window.
#
# Surface choice (the #11958 scope asked us to evaluate the candidates):
# of the pane-level surfaces, `pane-border-format` is the only one that
# can carry a *label* rather than colour alone, so the signal survives
# when colour rendering is unavailable, exactly as #11957 requires.
# `pane-border-style` / `pane-active-border-style` are colour-only and,
# worse, tmux already uses border colour to mark the focused pane, so
# tinting it by attention would fight the active/inactive cue; they are
# deliberately left untouched. The pane title is writable by the program
# running in the pane (shell / agent) and is not a reliable mozyo-owned
# surface, so it is not used either.
#
# Restraint: the pane border status line costs one screen row, and tmux
# draws it even for a single pane. To keep ordinary single-pane agent
# windows unchanged (full height, plus the #11957 window marker), a
# `window-layout-changed` hook enables `pane-border-status` only while a
# window actually has more than one pane, and turns it back off when the
# count drops to one. The hook is registered at a stable reserved array
# index (`[9000]`) with `-g`, *not* appended with `-ga`: `set-hook -ga`
# adds a fresh entry every time it runs, so re-sourcing this file
# (operator config reloads, repeated `source-file`) would pile up
# duplicate hooks. A fixed index makes the registration idempotent —
# re-sourcing replaces the mozyo entry in place — while any operator
# hooks at other indices are left untouched. 9000 is the reserved mozyo
# index; keep operator `window-layout-changed` hooks off it.
#
# The marker mirrors the window-status one exactly: `healthy`/unset add
# no label so healthy panes stay quiet, every other state appends a short
# uppercase `[LABEL]`, an unrecognised state fails safe to `[UNKNOWN]`
# rather than looking healthy, and `@mozyo_attention_severity` drives an
# auxiliary colour (critical → red, warning → amber, notice → blue) where
# the label, not the colour, carries the meaning. The quiet border still
# shows `index:command` for plain pane identification. This is projection
# only: the durable record stays in Redmine / the derived read model, the
# pane options are re-derivable and freely deletable, and nothing here
# feeds routing / handoff preflight / target resolution. Generic OSS
# defaults — no operator palette, no iTerm profile changes.
set-hook -g 'window-layout-changed[9000]' "set-window -F pane-border-status '#{?#{>:#{window_panes},1},top,off}'"
set -g pane-border-format " #{pane_index}:#{pane_current_command}#{?#{==:#{@mozyo_attention_state},},,#{?#{==:#{@mozyo_attention_state},healthy},, #{?#{==:#{@mozyo_attention_severity},critical},#[fg=colour203],#{?#{==:#{@mozyo_attention_severity},warning},#[fg=colour179],#{?#{==:#{@mozyo_attention_severity},notice},#[fg=colour110],}}}[#{?#{==:#{@mozyo_attention_state},owner_waiting},OWNER,#{?#{==:#{@mozyo_attention_state},review_waiting},REVIEW,#{?#{==:#{@mozyo_attention_state},blocked},BLOCKED,#{?#{==:#{@mozyo_attention_state},stalled},STALLED,#{?#{==:#{@mozyo_attention_state},done},DONE,#{?#{==:#{@mozyo_attention_state},retired_candidate},RETIRE,UNKNOWN}}}}}}]#[default]}} "

# --- terminal window title (Redmine #11638 / #11669) -------------------
# Several terminal windows (e.g. iTerm2) all titled "tmux" are
# indistinguishable when more than one workspace is open. Title the
# OS-level terminal window with the tmux session name, which mozyo
# derives per workspace (`mozyo-bridge session name`). In iTerm2
# control mode (`tmux -CC`) iTerm2 manages windows natively, so title
# reflection there depends on the iTerm2 build; see the executive
# terminal setup runbook.
set -g set-titles on
set -g set-titles-string "#S"

# --- Finder jump (Redmine #11638 / #11669) ------------------------------
# <prefix> f opens the current pane's working directory in the OS file
# manager. macOS `open`; this rebinds the default `find-window` from
# `f` (use `:find-window` from the command prompt when needed). The
# `q:` format modifier shell-quotes paths with spaces / Japanese
# segments (standard for the Google-Drive-hosted workspaces).
bind-key f run-shell "open #{q:pane_current_path}"

# --- extended keys passthrough (Redmine #11638 / #11670) ----------------
# Claude Code uses Shift+Enter for newline-without-submit. iTerm2
# supports the extended key sequence natively, but tmux eats it unless
# extended-keys forwarding is enabled, which is why Shift+Enter "does
# not work" only inside tmux. Requires tmux >= 3.2 (`tmux -V`); the
# interim fallback is `\` + Enter (Claude Code standard). `on` forwards
# extended keys to applications that request them.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
