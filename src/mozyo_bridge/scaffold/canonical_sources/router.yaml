# Canonical source for the tool-specific scaffold router templates
# (AGENTS.md for Codex, CLAUDE.md for Claude Code). Generated outputs
# live under `src/mozyo_bridge/scaffold/presets/_router/`; regenerate
# with `mozyo-bridge scaffold canonical` and verify drift with
# `mozyo-bridge scaffold canonical --check`.
#
# Fragments are concatenated in declaration order; a fragment emits
# only when every `when` key/value matches the active output context.

id: router

description: |
  Single source of truth for AGENTS.md and CLAUDE.md router templates.
  The router pair stays nearly identical in structure, but the bytes
  differ by tool: title and intro paragraph, the project-local-docs
  hint in the session-start step list, the inline guardrail body
  (Preset + Guardrails for Codex; ClaudeCode reminder block for
  Claude), and the project-local-additions hint comment.

outputs:
  - target: presets/_router/AGENTS.md
    context:
      tool: codex
  - target: presets/_router/CLAUDE.md
    context:
      tool: claude
  # Opt-in `--with-sublane-flow` variants (Redmine #12362 / #12363).
  # Byte-identical to the base router plus a thin sublane-flow read-route
  # section. `render_router_pair(..., sublane_flow=True)` reads these
  # instead of the base templates and still writes them to the target as
  # `AGENTS.md` / `CLAUDE.md`. The `sublane_flow: enabled` context only
  # activates the `sublane_route` fragment; the base outputs omit the key
  # so they render exactly as before.
  - target: presets/_router/AGENTS.sublane.md
    context:
      tool: codex
      sublane_flow: enabled
  - target: presets/_router/CLAUDE.sublane.md
    context:
      tool: claude
      sublane_flow: enabled

fragments:
  - id: title_intro
    when:
      tool: codex
    body_file: bodies/title_codex.md
  - id: title_intro
    when:
      tool: claude
    body_file: bodies/title_claude.md
  - id: session_start
    body_file: bodies/session_start.md
  - id: step_close
    when:
      tool: codex
    body_file: bodies/step_close_codex.md
  - id: step_close
    when:
      tool: claude
    body_file: bodies/step_close_claude.md
  - id: tool_body
    when:
      tool: codex
    body_file: bodies/body_codex.md
  - id: tool_body
    when:
      tool: claude
    body_file: bodies/body_claude.md
  # Always-rule digest (Redmine #13148). Shared across both tools and all
  # variants (empty `when` matches every output context), so the same
  # generated 1-line-per-rule digest + canonical pointers reach AGENTS.md
  # and CLAUDE.md. The rule bodies live in the distributed skill / preset;
  # this block is generated, never hand-edited, and drift falls out of
  # `scaffold canonical --check`. Placed after the tool body so it reads as
  # its own section just above the sublane route / project-local block.
  # Placement axis + line cap: vibes/docs/rules/workflow-docs-boundary.md
  # `## 規則の activation 軸`.
  - id: always_digest
    body_file: bodies/always_digest.md
  # Emits only for the `--with-sublane-flow` variant outputs (the base
  # outputs carry no `sublane_flow` key, so this `when` never matches
  # there). Shared across both tools; placed after the tool body and
  # before the project-local block so the read-route reads as its own
  # thin section just above Project-Local Additions.
  - id: sublane_route
    when:
      sublane_flow: enabled
    body_file: bodies/sublane_route.md
  - id: project_local
    when:
      tool: codex
    body_file: bodies/project_local_codex.md
  - id: project_local
    when:
      tool: claude
    body_file: bodies/project_local_claude.md
