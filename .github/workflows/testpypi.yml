name: Publish to TestPyPI

# Exact-SHA internal-beta gate (Redmine #13601).
#
# The manual path is decoupled from public `main` promotion and Redmine Version
# close so an internal beta can be published from an exact, reviewed integration
# head without first advancing public history (which would recreate the
# `Version close -> origin/main -> TestPyPI -> ... -> Version close` cycle this
# workflow exists to break).
#
# Trust model (Redmine #13601 j#75969 / j#75978):
#   - The workflow DEFINITION / event ref stays fixed to `main`. An arbitrary
#     staging ref is NEVER selected as the workflow authority, so no untrusted
#     ref can request OIDC.
#   - The ARTIFACT authority is the exact `source_sha` build input, checked out
#     only inside the trusted (main-defined) build job.
#   - The RELEASE-APPROVAL authority stays with the Redmine gate + the external
#     `testpypi` environment protection (owner required reviewer + main-only
#     deployment branch policy), configured separately before dispatch.
#   - The build job carries NO `id-token: write`. Only the publish job — which
#     merely downloads the built artifact and uploads it — holds `id-token:
#     write` + `environment: testpypi`, so Trusted Publishing credentials are
#     never exposed to the checkout/build/verify steps.
#
# Tiered pre-publish gate (Redmine #13734):
#   - BOTH events (manual exact-candidate AND automatic main-CI dev) run an
#     inline clean single-Python FULL suite + health/docs gate + fresh-install
#     smoke inside the trusted build job BEFORE the artifact is uploaded. The
#     mechanical gate does not merely TRUST a prior `Test` run — it runs the
#     whole suite at the exact checked-out SHA here, closing the manual-dispatch
#     bypass where a green-but-partial upstream signal could reach publish. The
#     4-version matrix is intentionally NOT duplicated here (that stays the
#     nightly/production tier); TestPyPI requires only the clean single-Python
#     full + artifact/install smoke.

run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && format('TestPyPI exact {0} @ {1} (nonce {2})', inputs.expected_version, inputs.source_sha, inputs.dispatch_nonce)
      || 'TestPyPI dev (auto main-CI)' }}

on:
  # Manual exact-candidate publish (internal-beta release-candidate check).
  # The event ref stays `main`; the exact reviewed candidate is passed as
  # `source_sha` and validated fail-closed before build/publish.
  workflow_dispatch:
    inputs:
      source_sha:
        description: "Exact 40-hex commit SHA to build and publish (artifact authority)."
        required: true
        type: string
      expected_version:
        description: "Exact package version that source_sha must carry in BOTH mirror files."
        required: true
        type: string
      source_ref:
        description: "Approved origin integration/release-candidate ref that must currently resolve to source_sha (lineage evidence). ancestor-only / local-only SHAs are refused."
        required: true
        type: string
      dispatch_nonce:
        description: "Unique token embedded in run-name for deterministic dispatch<->run correlation (no latest-one guessing)."
        required: true
        type: string
  # Automatic dev publish: after the required `Test` checks pass on `main`,
  # publish a unique PEP 440 `.devN` artifact so the normal-PATH pipx runtime
  # can be aligned to `main` without source-runtime or ad-hoc reinstalls.
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]

# Serialize by target version: two manual dispatches for the SAME
# expected_version cannot race the TestPyPI upload; the dev path serializes per
# triggering head_sha. Duplicate publishes are ALSO rejected TestPyPI-side, so
# this only removes the local race, it is not the sole uniqueness guard.
concurrency:
  group: >-
    testpypi-${{ github.event_name == 'workflow_dispatch'
      && format('exact-{0}', inputs.expected_version)
      || format('dev-{0}', github.event.workflow_run.head_sha) }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    # Trusted build + fail-closed verification. Runs from the main-defined
    # workflow, checks out the exact candidate SHA, and produces the artifact.
    # Carries NO id-token: the OIDC credential lives only in `publish`.
    runs-on: ubuntu-latest
    # Manual dispatch always runs; the automatic path runs only when the
    # triggering `Test` run on `main` actually succeeded (never on failure).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
    outputs:
      resolved_version: ${{ steps.resolve_version.outputs.version }}
    steps:
      - name: Resolve checkout SHA
        id: checkout_sha
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SHA: ${{ inputs.source_sha }}
          RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "sha=$INPUT_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$RUN_SHA" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          # ARTIFACT authority: build the exact candidate SHA. The workflow
          # DEFINITION is still `main` (this file), so untrusted candidate code
          # never becomes the workflow authority. fetch-depth 0 so the origin
          # ref-resolution gate below can consult remote refs.
          ref: ${{ steps.checkout_sha.outputs.sha }}
          fetch-depth: 0

      # --- Manual exact-candidate fail-closed gates (trusted, main-defined) ---
      # Each gate is inline in this main-defined YAML and reads candidate DATA
      # only (SHA, version literals) — it never executes candidate code to make
      # a gating decision, so a tampered candidate tree cannot fake a pass.

      - name: Verify exact source SHA == HEAD (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          case "$SOURCE_SHA" in
            *[!0-9a-f]* | "") echo "::error::source_sha must be 40-hex lowercase"; exit 1 ;;
          esac
          if [ "${#SOURCE_SHA}" -ne 40 ]; then
            echo "::error::source_sha must be exactly 40 hex chars (got ${#SOURCE_SHA})"; exit 1
          fi
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$HEAD_SHA" != "$SOURCE_SHA" ]; then
            echo "::error::checked-out HEAD $HEAD_SHA != source_sha $SOURCE_SHA"; exit 1
          fi
          echo "HEAD == source_sha ($SOURCE_SHA)"

      - name: Verify source_ref resolves to source SHA on origin (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail
          # F2 (Redmine #13601 j#76006): require EXACTLY ONE named origin ref
          # whose CURRENT tip is source_sha. The previous `ls-remote | awk NR==1`
          # accepted a refspec/glob (e.g. `refs/heads/*`) and passed on a
          # first-line coincidence. Reject glob/refspec metacharacters and
          # whitespace, then require exactly one non-peel match equal to
          # source_sha. Ancestor-only / local-only SHAs remain refused (ls-remote
          # returns only the ref tip).
          case "$SOURCE_REF" in
            *[!A-Za-z0-9._/-]* | "")
              echo "::error::source_ref must be a single plain ref name (no globs/refspec metacharacters/whitespace)"; exit 1 ;;
          esac
          # Annotated-tag peel lines end in `^{}`; drop them so a tag counts once.
          MATCHES="$(git ls-remote origin "$SOURCE_REF" | awk '$2 !~ /\^\{\}$/ {print $1}')"
          COUNT="$(printf '%s\n' "$MATCHES" | grep -c . || true)"
          if [ "$COUNT" -ne 1 ]; then
            echo "::error::source_ref '$SOURCE_REF' resolved to $COUNT origin refs; require exactly one"; exit 1
          fi
          RESOLVED="$(printf '%s\n' "$MATCHES" | head -n1)"
          if [ "$RESOLVED" != "$SOURCE_SHA" ]; then
            echo "::error::source_ref '$SOURCE_REF' tip $RESOLVED != source_sha $SOURCE_SHA"; exit 1
          fi
          echo "source_ref '$SOURCE_REF' -> exactly one origin ref tip == source_sha"

      - name: Verify version mirror == expected_version (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          set -euo pipefail
          # Trusted inline check: the 2-file mirror set is duplicated here on
          # purpose (main-defined, no candidate code executed). Keep it in
          # lockstep with vibes/docs/logics/release-helper-contract.md.
          python3 - <<'PY'
          import os, re, sys
          expected = os.environ["EXPECTED_VERSION"]
          mirror = {
              "pyproject.toml": r'(?m)^version\s*=\s*"([^"]+)"',
              "src/mozyo_bridge/__init__.py": r'(?m)^__version__\s*=\s*"([^"]+)"',
          }
          seen = {}
          for path, pattern in mirror.items():
              with open(path, encoding="utf-8") as fh:
                  match = re.search(pattern, fh.read())
              if not match:
                  print(f"::error::no version literal found in {path}")
                  sys.exit(1)
              seen[path] = match.group(1)
          values = set(seen.values())
          if values != {expected}:
              print(f"::error::version mirror {seen} != expected_version {expected!r}")
              sys.exit(1)
          print(f"version mirror == expected_version ({expected})")
          PY

      - name: Verify candidate Test workflow matches trusted main (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          # F1 (Redmine #13601 j#76006): a candidate could weaken its OWN
          # .github/workflows/test.yml and obtain a green Test run at source_sha.
          # Selecting the Test run by workflow path only proves the workflow
          # FAMILY, not that the run executed trusted content. Require the
          # candidate's test.yml to be byte-identical to trusted origin/main's
          # test.yml, so the green Test run accepted below actually ran the
          # trusted definition. This comparison is inline in the main-defined
          # (trusted) workflow and executes no candidate code.
          git fetch --no-tags origin main
          TRUSTED="$(git show FETCH_HEAD:.github/workflows/test.yml)"
          CANDIDATE="$(git show HEAD:.github/workflows/test.yml)"
          if [ "$TRUSTED" != "$CANDIDATE" ]; then
            echo "::error::candidate .github/workflows/test.yml differs from trusted origin/main; refusing (fail-closed). Rebase the candidate onto a main whose Test definition it matches."; exit 1
          fi
          echo "candidate Test workflow == trusted origin/main"

      - name: Verify successful Test CI for source SHA (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Require a completed + success run of the TRUSTED `Test` workflow
          # (.github/workflows/test.yml) for exactly this head_sha. The prior
          # step proved the candidate's test.yml equals trusted main, so this
          # success attests trusted CI content ran, not a candidate-weakened one.
          SUCCESSES="$(gh api -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/actions/workflows/test.yml/runs?head_sha=$SOURCE_SHA&status=completed" \
            --jq '[.workflow_runs[] | select(.conclusion == "success")] | length')"
          if [ "${SUCCESSES:-0}" -lt 1 ]; then
            echo "::error::no completed+success Test run for source_sha $SOURCE_SHA"; exit 1
          fi
          echo "Test CI success runs for source_sha: $SUCCESSES"

      - name: Verify expected_version is unused on TestPyPI (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          set -euo pipefail
          # F3 (Redmine #13601 j#76006): a malformed / partial payload must NOT
          # be read as "unused". Fail closed on any lookup error AND on any
          # payload that does not carry the documented `releases` object schema,
          # so an unknown/unprovable uniqueness state never green-lights publish.
          # MOZYO_TESTPYPI_JSON_URL is overridable only so the regression test
          # can point the SAME gate body at a local fixture; production uses the
          # real TestPyPI JSON endpoint.
          python3 - <<'PY'
          import json, os, sys, urllib.error, urllib.request
          expected = os.environ["EXPECTED_VERSION"]
          url = os.environ.get("MOZYO_TESTPYPI_JSON_URL") or "https://test.pypi.org/pypi/mozyo-bridge/json"
          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  raw = response.read().decode("utf-8")
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print("project not yet on TestPyPI; version is unused")
                  sys.exit(0)
              print(f"::error::TestPyPI lookup failed ({exc}); refusing (fail-closed)")
              sys.exit(1)
          except Exception as exc:  # noqa: BLE001 - any transport error is fail-closed
              print(f"::error::TestPyPI lookup unreachable ({exc}); refusing (fail-closed)")
              sys.exit(1)
          try:
              data = json.loads(raw)
          except (ValueError, TypeError) as exc:
              print(f"::error::TestPyPI payload is not valid JSON ({exc}); refusing (fail-closed)")
              sys.exit(1)
          # Require the documented schema BEFORE declaring the version unused: a
          # 200 response missing `releases`, or with a non-dict `releases`, is an
          # unprovable state, not proof of absence.
          if not isinstance(data, dict) or not isinstance(data.get("releases"), dict):
              print("::error::TestPyPI payload has no `releases` object; cannot prove version unused (fail-closed)")
              sys.exit(1)
          if expected in data["releases"]:
              print(f"::error::version {expected} already published on TestPyPI")
              sys.exit(1)
          print(f"version {expected} is unused on TestPyPI")
          PY

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # --- Tiered pre-publish clean-runner gate (Redmine #13734) ---
      # Runs for BOTH events at the exact checked-out candidate SHA, BEFORE any
      # dev-version rewrite and BEFORE upload. This is the mechanical gate that
      # closes the manual-dispatch bypass: the whole suite + health/docs run
      # here rather than only trusting a prior signal.
      - name: Install package (pre-publish gate)
        run: python -m pip install .

      - name: Module-health gate (pre-publish)
        run: mozyo-bridge health check

      - name: Docs catalog validate (pre-publish)
        run: mozyo-bridge docs validate --repo .

      - name: Run full suite (clean single-Python, pre-publish)
        # SAME discovery as `python -m unittest discover -s tests`; the suite
        # verdict drives the exit code. Single Python by design (the 4-version
        # matrix stays the nightly/production tier, Redmine #13734).
        run: mozyo-bridge tests profile --slowest 20

      - name: Install build tools
        run: python -m pip install build

      - name: Resolve build version
        id: resolve_version
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          SOURCE_REF: ${{ inputs.source_ref }}
          DEV_RUN_ID: ${{ github.event.workflow_run.id }}
          DEV_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          DEV_RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            # Automatic dev path: rewrite EVERY release-version mirror file to
            # the same exact dev version so the wheel METADATA and runtime
            # __version__ / CLI --version agree (Redmine #13586). Manual dispatch
            # keeps the committed release version (already fail-closed verified
            # to equal expected_version above).
            TS="$(date -u +%Y%m%d%H%M%S)"
            DEV_NUMBER="${TS}${DEV_RUN_ID}"
            DEV_VERSION="$(python scripts/compute_testpypi_dev_version.py --dev-number "$DEV_NUMBER" --write)"
            echo "version=$DEV_VERSION" >> "$GITHUB_OUTPUT"
            {
              echo "### TestPyPI dev publish"
              echo ""
              echo "- version: \`$DEV_VERSION\`"
              echo "- commit: \`$DEV_HEAD_SHA\`"
              echo "- source CI run: $DEV_RUN_URL"
              echo ""
              echo "Record this version <-> commit mapping with the smoke evidence."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "version=$EXPECTED_VERSION" >> "$GITHUB_OUTPUT"
            {
              echo "### TestPyPI exact-candidate publish"
              echo ""
              echo "- version: \`$EXPECTED_VERSION\`"
              echo "- source_sha: \`$SOURCE_SHA\`"
              echo "- source_ref: \`$SOURCE_REF\`"
              echo ""
              echo "Fail-closed gates passed: HEAD==source_sha, source_ref->source_sha,"
              echo "version mirror==expected_version, Test CI success, version unused."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build package
        run: python -m build

      - name: Fresh-install smoke (built artifact, pre-publish)
        # Install the just-built wheel into an ISOLATED venv and exercise both
        # console entry points before the artifact can be uploaded/published.
        # Proves the exact artifact that will land on TestPyPI imports and
        # exposes `mozyo-bridge` / `mozyo` (Redmine #13734 artifact/install
        # smoke). Runs for both events.
        run: |
          set -euo pipefail
          python -m venv /tmp/testpypi-smoke-venv
          /tmp/testpypi-smoke-venv/bin/python -m pip install --upgrade pip
          WHEEL="$(ls dist/*.whl | head -n1)"
          if [ -z "$WHEEL" ]; then
            echo "::error::no wheel built for install smoke"; exit 1
          fi
          /tmp/testpypi-smoke-venv/bin/python -m pip install "$WHEEL"
          /tmp/testpypi-smoke-venv/bin/mozyo-bridge --version
          /tmp/testpypi-smoke-venv/bin/mozyo-bridge --help > /dev/null
          /tmp/testpypi-smoke-venv/bin/mozyo --help > /dev/null

      - name: Disposable Ubuntu container smoke (built artifact, pre-publish)
        # Redmine #14100 (parent #14098): black-box the SAME built wheel on a
        # pinned, non-root, fresh-HOME Ubuntu container with NO source checkout
        # mounted, BEFORE the artifact can be uploaded/published. This runs
        # after `Build package` and after the venv fresh-install smoke, and
        # before `Upload built distributions`, so the job order stays
        # build -> smoke -> upload (publish is a separate OIDC-only job).
        #
        # It complements — does not duplicate — the venv fresh-install smoke
        # above: that smoke installs into a venv on the BUILD RUNNER as the
        # runner user; this one crosses an OS boundary (pinned Ubuntu LTS), runs
        # as a NON-root user in a FRESH HOME with the repo checkout absent, and
        # drives the real user harness (rules install/status, scaffold
        # apply/status, docs validate/resolve, doctor runtime) rather than only
        # `--version` / `--help`. Blocking authority is the image DIGEST: the
        # script refuses a floating tag in blocking mode, so a moving image can
        # never be the gate. No credentials are injected into the container.
        env:
          # Pinned Ubuntu 24.04 digest = blocking authority. Kept in lockstep
          # with vibes/docs/logics/tiered-ci-gate-policy.md
          # (## Disposable Ubuntu container smoke); refresh both together.
          DISPOSABLE_UBUNTU_IMAGE: "ubuntu@sha256:4fbb8e6a8395de5a7550b33509421a2bafbc0aab6c06ba2cef9ebffbc7092d90"
          RESOLVED_VERSION: ${{ steps.resolve_version.outputs.version }}
        run: |
          set -euo pipefail
          python scripts/disposable_ubuntu_smoke.py \
            --artifact-dir dist \
            --expected-version "$RESOLVED_VERSION" \
            --image "$DISPOSABLE_UBUNTU_IMAGE" \
            --json-summary container-smoke-summary.json
          {
            echo "### Disposable Ubuntu container smoke (blocking)"
            echo ""
            echo '```json'
            cat container-smoke-summary.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-dist
          path: dist/
          if-no-files-found: error

  publish:
    # OIDC publish job: downloads the artifact built + verified by `build` and
    # uploads it. This is the ONLY job carrying id-token: write + the protected
    # `testpypi` environment, so Trusted Publishing credentials never touch the
    # checkout / build / verify surface.
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: testpypi-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
