name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install .

      - name: Module-health gate
        # PyLint-`too-many-lines`-equivalent gate (Redmine #12321): fails a new
        # oversized module or growth of an allowlisted one past its baseline.
        # Reads module_health.yaml from the repo root (the checkout cwd).
        run: mozyo-bridge health check

      - name: Run unit tests (with runtime summary)
        # Default lane (Redmine #12754): quiet test output plus a measured
        # runtime summary, so a slow CI run can be split into its causes after
        # the fact. `tests profile` runs the SAME discovery as
        # `python -m unittest discover -s tests`; the suite verdict drives the
        # exit code (reliability unchanged). Verbose `-v` is opt-in for a
        # failure-investigation lane, not the default; slow-test budget
        # violations are reported but do NOT fail the run (no `--enforce`) so
        # timing variance never makes CI flaky. See
        # vibes/docs/logics/test-runtime-profiling-policy.md.
        run: mozyo-bridge tests profile --slowest 20

      - name: Build wheel
        run: |
          python -m pip install build
          python -m build
