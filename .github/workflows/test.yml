name: Test

# Quick + full unittest lane split (Redmine #12753).
#
# - Pull requests run the `quick` lane only: the lint/health + docs gate plus
#   the AFFECTED tests resolved from the PR diff. Fast feedback on the common
#   path.
# - Everything else (push / merge to a branch, the nightly schedule, and manual
#   dispatch) runs the `full` lane: `python -m unittest discover -s tests` across
#   the whole Python matrix, the merge / nightly / release safety gate.
#
# The quick lane reuses the SAME #12752 impact resolver the local command uses
# (`mozyo-bridge tests resolve`), so local and CI selection stay identical. A
# fail-closed `full` recommendation makes the quick lane run the whole suite, so
# an unmapped change is never silently under-tested. See
# vibes/docs/logics/ci-quick-full-lane-policy.md for the full-lane failure /
# release-gate handling.

on:
  push:
  pull_request:
  schedule:
    # Nightly full-suite safety lane (07:00 JST = 22:00 UTC).
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  quick:
    # Fast PR feedback lane: lint/health + docs gate + affected tests only.
    name: Quick lane (affected tests)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Need history to diff the PR branch against its merge target.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install .

      - name: Module-health gate
        # PyLint-`too-many-lines`-equivalent gate (Redmine #12321): fails a new
        # oversized module or growth of an allowlisted one past its baseline.
        run: mozyo-bridge health check

      - name: Docs catalog validate
        # Lint/docs check half of the quick lane: keep the governed catalog and
        # its generated artifacts consistent before running tests.
        run: mozyo-bridge docs validate --repo .

      - name: Run affected tests
        # Resolve the PR-changed source paths to focused targets via the SAME
        # resolver the local command uses (Redmine #12752 / #12753), then run
        # them. The resolver fails CLOSED: an unmapped change recommends `full`,
        # which `--format targets` emits as `discover -s tests`, so the quick
        # lane runs the WHOLE suite rather than silently nothing. It never emits
        # an empty target list, so the pipe always runs a real selection.
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF:refs/remotes/origin/$BASE_REF"
          mozyo-bridge tests resolve --base "origin/$BASE_REF" --format targets \
            | xargs python -m unittest

  full:
    # Full-suite safety lane: push / merge, nightly schedule, manual dispatch.
    # Preserves `python -m unittest discover -s tests` as the merge / nightly /
    # release gate (Redmine #12753 acceptance). Slow-test budget violations are
    # reported but do NOT fail the run (no `--enforce`), so timing variance
    # never makes CI flaky — only the suite verdict is authoritative.
    name: Full lane (whole suite)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install .

      - name: Module-health gate
        run: mozyo-bridge health check

      - name: Run unit tests (full discover with runtime summary)
        # Default lane (Redmine #12754): quiet output plus a measured runtime
        # summary. `tests profile` runs the SAME discovery as
        # `python -m unittest discover -s tests`; the suite verdict drives the
        # exit code. See vibes/docs/logics/test-runtime-profiling-policy.md.
        run: mozyo-bridge tests profile --slowest 20

      - name: Build wheel
        run: |
          python -m pip install build
          python -m build
