name: Publish to PyPI

# Production release gate (Redmine #13734, parent US #13732).
#
# Production publish is mechanically gated inside the publish workflow itself,
# NOT by a policy-doc manual assumption:
#   - `verify` runs the supported Python 3.10-3.13 FULL suite at the exact
#     release SHA, plus the module-health gate, a `v`-prefixed-tag requirement,
#     and a tag<->version-mirror equality check (ties the artifact to the tag
#     mechanically).
#   - `build` builds wheel+sdist at the SAME immutable SHA and runs a
#     fresh-install smoke on the built artifact. Both `verify` and `build`
#     check out `github.sha` (the immutable release-event commit) and re-assert
#     `HEAD == github.sha`, so a tag force-moved mid-run cannot ship an
#     unverified commit (Redmine #13734 j#77258 F1).
#   - `publish` is the ONLY job carrying `id-token: write` + `environment: pypi`;
#     it merely downloads the verified artifact and uploads it, so Trusted
#     Publishing credentials never touch the checkout/build/verify surface
#     (same OIDC boundary as testpypi.yml, Redmine #13601).
#
# The trigger stays `release: published`; pushing a tag alone does not publish.
# See vibes/docs/logics/tiered-ci-gate-policy.md and
# vibes/docs/logics/release-flow.md (`## Production Release Gate`).

on:
  release:
    types: [published]

# Never cancel an in-flight production publish; serialize per release tag so a
# duplicate release event cannot race the upload (Redmine #13734).
concurrency:
  group: publish-pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    # Supported-Python full matrix at the exact release SHA. Carries NO
    # id-token: the OIDC credential lives only in `publish`.
    name: Full matrix verify (exact release SHA)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          # Pin to the IMMUTABLE release-event commit SHA, not the mutable tag
          # name. `github.sha` is fixed at trigger time to the commit the tag
          # pointed to; a later force-move of the tag cannot redirect this
          # checkout (Redmine #13734 j#77258 F1). fetch-depth 0 for completeness.
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Verify checkout is the exact release SHA
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$HEAD_SHA" != "$RELEASE_SHA" ]; then
            echo "::error::checked-out HEAD $HEAD_SHA != release SHA $RELEASE_SHA"; exit 1
          fi
          echo "HEAD == release SHA ($RELEASE_SHA)"

      - name: Verify tag matches version mirror
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          # Require a `v`-prefixed release tag (release-flow.md ## Tag and
          # Release: release tags are annotated `vX.Y.Z`), then require BOTH
          # mirror files to carry exactly the stripped version. Ties the
          # published artifact to the canonical tag mechanically. A non-`v` tag
          # fails CLOSED (Redmine #13734 j#77258 F2) — GitHub Release creation
          # triggers production publish even outside the helper, so the workflow
          # must reject non-canonical tags itself. Mirror set kept in lockstep
          # with vibes/docs/logics/release-helper-contract.md.
          python3 - <<'PY'
          import os, re, sys
          tag = os.environ["TAG_NAME"]
          if not tag.startswith("v") or len(tag) < 2:
              print(f"::error::release tag {tag!r} must be v-prefixed (vX.Y.Z); "
                    "release policy requires the `v` prefix (release-flow.md ## Tag and Release)")
              sys.exit(1)
          expected = tag[1:]
          mirror = {
              "pyproject.toml": r'(?m)^version\s*=\s*"([^"]+)"',
              "src/mozyo_bridge/__init__.py": r'(?m)^__version__\s*=\s*"([^"]+)"',
          }
          seen = {}
          for path, pattern in mirror.items():
              with open(path, encoding="utf-8") as fh:
                  match = re.search(pattern, fh.read())
              if not match:
                  print(f"::error::no version literal found in {path}")
                  sys.exit(1)
              seen[path] = match.group(1)
          values = set(seen.values())
          if values != {expected}:
              print(f"::error::version mirror {seen} != tag version {expected!r}")
              sys.exit(1)
          print(f"version mirror == tag version ({expected})")
          PY

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install .

      - name: Module-health gate
        run: mozyo-bridge health check

      - name: Run full suite (supported-Python matrix)
        # SAME discovery as `python -m unittest discover -s tests`; the suite
        # verdict drives the exit code (Redmine #13734 production full matrix).
        run: mozyo-bridge tests profile --slowest 20

  build:
    # Build + fresh-install smoke of the exact release SHA. Runs only after the
    # full matrix verify passes. Carries NO id-token.
    name: Build + install smoke (exact release SHA)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          # Artifact authority: build the IMMUTABLE release-event SHA, not the
          # mutable tag name. Without this, a tag force-moved between `verify`
          # and `build` could ship a wheel/sdist from a commit that never passed
          # the full matrix verify (Redmine #13734 j#77258 F1 TOCTOU).
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Verify build checkout is the exact release SHA
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Re-assert on the artifact-authority job itself (not only `verify`):
          # the commit being packaged MUST be the one the full matrix verified.
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$HEAD_SHA" != "$RELEASE_SHA" ]; then
            echo "::error::build HEAD $HEAD_SHA != release SHA $RELEASE_SHA; refusing to build an unverified commit"; exit 1
          fi
          echo "build HEAD == release SHA ($RELEASE_SHA)"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install build

      - name: Build package
        run: python -m build

      - name: Fresh-install smoke (built artifact)
        # Install the just-built wheel into an ISOLATED venv and exercise both
        # console entry points before the artifact can be published (Redmine
        # #13734 artifact/fresh-install gate).
        run: |
          set -euo pipefail
          python -m venv /tmp/pypi-smoke-venv
          /tmp/pypi-smoke-venv/bin/python -m pip install --upgrade pip
          WHEEL="$(ls dist/*.whl | head -n1)"
          if [ -z "$WHEEL" ]; then
            echo "::error::no wheel built for install smoke"; exit 1
          fi
          /tmp/pypi-smoke-venv/bin/python -m pip install "$WHEEL"
          /tmp/pypi-smoke-venv/bin/mozyo-bridge --version
          /tmp/pypi-smoke-venv/bin/mozyo-bridge --help > /dev/null
          /tmp/pypi-smoke-venv/bin/mozyo --help > /dev/null

      - name: Disposable Ubuntu container smoke (built artifact, pre-publish)
        # Redmine #14100 (parent #14098): black-box the SAME built wheel on a
        # pinned, non-root, fresh-HOME Ubuntu container with NO source checkout
        # mounted, BEFORE the artifact can be published. Runs after `Build
        # package` + venv fresh-install smoke and before `Upload built
        # distributions`, keeping the job order build -> smoke -> upload; only
        # the separate `publish` job carries OIDC.
        #
        # Complements — does not duplicate — the venv fresh-install smoke above:
        # this crosses an OS boundary (pinned Ubuntu LTS), runs as a NON-root
        # user in a FRESH HOME with the repo checkout absent, and drives the
        # real user harness (rules / scaffold / docs / doctor runtime), not just
        # `--version` / `--help`. Blocking authority is the image DIGEST (the
        # script refuses a floating tag in blocking mode). The expected version
        # is the stripped release tag, which `verify` already proved equals the
        # 2-file version mirror. No credentials are injected into the container.
        env:
          # Pinned Ubuntu 24.04 digest = blocking authority. Kept in lockstep
          # with vibes/docs/logics/tiered-ci-gate-policy.md
          # (## Disposable Ubuntu container smoke); refresh both together.
          DISPOSABLE_UBUNTU_IMAGE: "ubuntu@sha256:4fbb8e6a8395de5a7550b33509421a2bafbc0aab6c06ba2cef9ebffbc7092d90"
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          EXPECTED_VERSION="${TAG_NAME#v}"
          python scripts/disposable_ubuntu_smoke.py \
            --artifact-dir dist \
            --expected-version "$EXPECTED_VERSION" \
            --image "$DISPOSABLE_UBUNTU_IMAGE" \
            --json-summary container-smoke-summary.json
          {
            echo "### Disposable Ubuntu container smoke (blocking)"
            echo ""
            echo '```json'
            cat container-smoke-summary.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Production release summary
        if: always()
        env:
          TAG: ${{ github.event.release.tag_name }}
          SHA: ${{ github.sha }}
        run: |
          {
            echo "### Production publish gate"
            echo ""
            echo "- tag: \`$TAG\`"
            echo "- exact SHA: \`$SHA\`"
            echo "- verify: Python 3.10-3.13 full \`unittest discover\` + health + tag<->version mirror"
            echo "- build: wheel+sdist + fresh-install smoke (\`mozyo-bridge\` / \`mozyo\`)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/
          if-no-files-found: error

  publish:
    # OIDC publish job: downloads the artifact built + verified above and
    # uploads it. This is the ONLY job carrying id-token: write + the protected
    # `pypi` environment, so Trusted Publishing credentials never touch the
    # checkout / build / verify surface.
    name: Publish to PyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
