      #12153/#12155) moved registration out but the handler bodies still live
      here. Largest decomposition target. Baseline raised 5720 -> 6072 on
      integrating already-reviewed #12341 cockpit membership list/status CLI
      handlers into this module (#12321 j#62683). Raised 6072 -> 6136 for the
      #12388 role-profile resolution wiring in `orchestrate_handoff` (fail-closed
      resolve + threading the resolution through the typed terminal paths).
      Raised 6136 -> 6157 for the #12466 delegated-coordinator-tree display
      columns in `cmd_agents_targets` (derive once + render KIND/DEPTH/PARENT in
      text and the additive JSON `delegation` record; the derivation itself lives
      in the new `domain/delegation_display.py`, not here).
      Raised 6157 -> 6205 for the #12467 delegated-coordinator window-policy
      display wiring in `cmd_agents_targets` (per-repo fail-soft
      `delegation_window_policy` resolution + the additive JSON
      `delegation_window` sibling; the policy schema/resolver live in
      `domain/presentation_grouping/`, not here).
      Raised 6205 -> 6270 for the #12580/#12581 queue-enter Enter-only retry in
      `orchestrate_handoff` (re-issue Enter on the policy interval until the
      marker is observed or the window elapses, marker+body typed once; the
      retry probe shares the new `_marker_visible_in` one-shot matcher and the
      policy/telemetry types live in `domain/handoff.py`, not here).
      Raised 6270 -> 6389 for the #12597 standard_target_admission rail in
      `orchestrate_handoff` (replace the Step 11 active-split fail-closed with
      the admission gate + `select-pane` activation/restore via the new
