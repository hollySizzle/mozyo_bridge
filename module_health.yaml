# Module-health gate config (Redmine #12321).
#
# Read by `mozyo-bridge health check` / `mozyo-bridge health report`. The gate
# enforces a PyLint-`too-many-lines`-equivalent threshold over the runtime
# package and records the existing oversized modules here instead of splitting
# them (splitting is an explicit #12321 non-goal). See
# vibes/docs/logics/module-health-gate.md for the full contract.
#
# Gate behavior:
#   - a module over `max_module_lines` that is NOT listed below fails the gate
#     (new oversized file);
#   - a listed module whose current line count exceeds its `lines` baseline
#     fails the gate (existing oversized file grew);
#   - `lines` is the recorded baseline; lower it (with justification) only when
#     the module actually shrinks.
#
# `resolution_version: TBD` means a decomposition target version is not yet
# scheduled. Scheduling per-module splits is a roadmap decision for the
# coordinator/owner (tracked under the #11825 Plugin/Adapter boundary epic);
# this gate's job is to stop *new* growth, not to plan the splits.

max_module_lines: 1000

include:
  - src/mozyo_bridge

allowlist:
  - path: src/mozyo_bridge/application/commands.py
    lines: 5720
    reason: >-
      Monolithic command-handler module; the CLI parser split (#12138/#12141/
      #12153/#12155) moved registration out but the handler bodies still live
      here. Largest decomposition target.
    owner_issue: "#12321"
    resolution_version: TBD

  - path: src/mozyo_bridge/domain/cockpit_layout.py
    lines: 2344
    reason: >-
      Cockpit layout geometry/projection domain; dense but cohesive. Candidate
      to split along geometry vs projection responsibilities.
    owner_issue: "#12321"
    resolution_version: TBD

  - path: src/mozyo_bridge/application/doctor.py
    lines: 1852
    reason: >-
      Aggregated health/diagnostic collectors for `mozyo-bridge doctor`; grows
      with each new diagnostic section.
    owner_issue: "#12321"
    resolution_version: TBD

  - path: src/mozyo_bridge/application/release.py
    lines: 1470
    reason: >-
      Release check/bump/publish/workflow helpers in one module. Splitting
      touches release gates, so it is sequenced carefully.
    owner_issue: "#12321"
    resolution_version: TBD

  - path: src/mozyo_bridge/domain/presentation_grouping.py
    lines: 1228
    reason: >-
      Presentation grouping domain explicitly named oversized in #12321.
      Decomposition target.
    owner_issue: "#12321"
    resolution_version: TBD

  - path: src/mozyo_bridge/domain/handoff.py
    lines: 1084
    reason: >-
      Handoff routing/kind/mode domain core. Cohesive but over threshold.
    owner_issue: "#12321"
    resolution_version: TBD

  - path: src/mozyo_bridge/application/cockpit_ui.py
    lines: 1041
    reason: >-
      Cockpit UI rendering explicitly named oversized in #12321. Low symbol
      count (18) but long render bodies. Decomposition target.
    owner_issue: "#12321"
    resolution_version: TBD

  - path: src/mozyo_bridge/scaffold/rules.py
    lines: 1027
    reason: >-
      Scaffold preset/rule installation logic. Just over threshold.
    owner_issue: "#12321"
    resolution_version: TBD
