# Module-health gate config (Redmine #12321; ratchet US #12324).
#
# Read by `mozyo-bridge health check` / `mozyo-bridge health report`. The gate
# enforces a PyLint-`too-many-lines`-equivalent threshold over the runtime
# package and records the existing oversized modules here instead of splitting
# them (full legacy teardown is an explicit non-goal). See
# vibes/docs/logics/module-health-gate.md for the full contract.
#
# Gate behavior:
#   - a module over `max_module_lines` that is NOT listed below fails the gate
#     (new oversized file);
#   - a listed module whose current line count exceeds its `lines` baseline
#     fails the gate (existing oversized file grew);
#   - a listed, still-oversized module whose `expires` deadline has passed fails
#     the gate (#12324 expiry ratchet) — the exception cannot live forever;
#   - `lines` is the recorded baseline; lower it (with justification) only when
#     the module actually shrinks.
#
# Every entry MUST carry a Redmine `owner_issue` AND an `expires` deadline
# (#12324 acceptance). `expires` is the date the exception lapses; it is set to
# the planned resolution Version's due date. Within `expiry_warning_days` of the
# deadline the gate emits a non-fatal "expiring soon" warning so Review Request /
# Version close readiness sees the impact before the deadline, not only after.
#
# `resolution_version` records the planned release each oversized module is
# scheduled to be reduced in (coordinator decision, #12321 j#62668):
#   - presentation_grouping.py -> v0.10.8  (Version #239, US #12322) — DONE: split
#     into the `domain/presentation_grouping/` subpackage (config / validation /
#     authority guard / placement / degraded submodules), so it is no longer
#     oversized and its allowlist entry has been removed.
#   - cockpit_ui.py            -> v0.10.9  (Version #240, US #12323) — DONE: split
#       into cockpit_page.py / cockpit_payload.py / cockpit_actions.py and removed
#       from this allowlist; cockpit_ui.py is now a thin facade.
#   - the remaining six        -> v0.10.10 (Version #241 ratchet, US #12324),
#       due 2027-11-30 — each `expires` below tracks that Version due date. The
#       splits themselves are deferred to per-module follow-up issues under that
#       Version; this gate stops *new* growth and forces resolution by the
#       deadline in the meantime.

max_module_lines: 1000

# Days before an `expires` deadline at which the gate starts warning (non-fatal).
expiry_warning_days: 30

include:
  - src/mozyo_bridge

allowlist:
