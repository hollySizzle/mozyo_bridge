version: 1
presentation:
  project_group_presentation: project_group_tmux_window
  project_groups:
    - group_id: project:mozyo_bridge
      label: mozyo_bridge
  grouping:
    membership_rules:
      - when:
          repo_label: mozyo-giken-3800-mozyo-bridge
        group_id: project:mozyo_bridge
agent_launch:
  launch_argv:
    claude:
      sublane: ["--model", "claude-opus-4-8"]
    codex:
      default: ["--config", "model_reasoning_effort=xhigh"]
      sublane: ["--config", "model_reasoning_effort=high"]
provider_binding:
  bindings:
    coordinator: codex
terminal_transport:
  backend: herdr
